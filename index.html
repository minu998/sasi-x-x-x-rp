        /* ===== CSS Variables ===== */
        :root {
            --primary: #f7971e;
            --secondary: #ffd200;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --glow-color: rgba(255, 215, 0, 0.15);
            --transition-smooth: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* ===== Reset ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            user-select: none !important;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg-dark);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            position: relative;
        }

        /* =============================================
                   ANIMATED BACKGROUND PARTICLES
                   ============================================= */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* =============================================
                   MAIN CONTAINER
                   ============================================= */
        .main-container {
            width: 100%;
            height: 100vh;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgba(18, 18, 26, 0.85);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 
                0 40px 100px rgba(0, 0, 0, 0.9),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: containerIn 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform-origin: center;
        }

        @keyframes containerIn {
            0% { opacity: 0; transform: scale(0.95) rotateX(5deg); }
            100% { opacity: 1; transform: scale(1) rotateX(0deg); }
        }

        /* =============================================
                   GLOW ORB BACKGROUND
                   ============================================= */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 20s ease-in-out infinite alternate;
        }

        .glow-orb.orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(247, 151, 30, 0.08);
            top: -100px;
            right: -100px;
            animation-delay: 0s;
        }

        .glow-orb.orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(255, 210, 0, 0.06);
            bottom: -80px;
            left: -80px;
            animation-delay: -7s;
        }

        .glow-orb.orb-3 {
            width: 200px;
            height: 200px;
            background: rgba(247, 151, 30, 0.04);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.1); }
            66% { transform: translate(-20px, 30px) scale(0.9); }
            100% { transform: translate(10px, -20px) scale(1.05); }
        }

        /* =============================================
                   LOGIN OVERLAY
                   ============================================= */
        .login-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.92);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                        visibility 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                        backdrop-filter 0.8s ease;
        }

        .login-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            backdrop-filter: blur(0px);
            -webkit-backdrop-filter: blur(0px);
        }

        .login-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 55px 50px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            box-shadow: 
                0 40px 120px rgba(0, 0, 0, 0.8),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            position: relative;
            overflow: hidden;
            animation: loginIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform: translateY(50px) scale(0.95);
            opacity: 0;
        }

        @keyframes loginIn {
            0% { opacity: 0; transform: translateY(50px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(255, 215, 0, 0.03) 0%, transparent 70%);
            pointer-events: none;
            animation: shineRotate 10s linear infinite;
        }

        @keyframes shineRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .login-box .lock-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 8px;
        }

        .login-box .lock-icon {
            font-size: 64px;
            display: block;
            animation: lockFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.1));
        }

        @keyframes lockFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            25% { transform: translateY(-6px) rotate(-3deg); }
            75% { transform: translateY(-6px) rotate(3deg); }
        }

        .login-box .lock-ring {
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            border: 2px solid rgba(255, 215, 0, 0.05);
            animation: ringPulse 2s ease-in-out infinite;
        }

        @keyframes ringPulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 0; }
        }

        .login-box h2 {
            color: var(--text-primary);
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
            position: relative;
        }

        .login-box h2 .highlight {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-box .sub {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .login-box .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .login-box .input-group .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #444;
            transition: color 0.3s ease;
            pointer-events: none;
        }

        .login-box input[type="password"] {
            width: 100%;
            padding: 17px 20px 17px 50px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            font-size: 18px;
            outline: none;
            transition: all 0.4s ease;
            letter-spacing: 4px;
            font-weight: 600;
        }

        .login-box input[type="password"]:focus {
            border-color: var(--secondary);
            box-shadow: 
                0 0 40px rgba(255, 215, 0, 0.05),
                inset 0 0 30px rgba(255, 215, 0, 0.02);
            transform: scale(1.01);
            background: rgba(255, 255, 255, 0.05);
        }

        .login-box input[type="password"]:focus + .input-icon {
            color: var(--secondary);
        }

        .login-box input[type="password"]::placeholder {
            color: #444;
            letter-spacing: 2px;
            font-size: 15px;
            font-weight: 400;
        }

        .login-box .password-strength {
            height: 2px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2px;
            margin-top: -8px;
            margin-bottom: 16px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .login-box .password-strength.active {
            opacity: 1;
        }

        .login-box .password-strength .bar {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.5s ease, background 0.5s ease;
        }

        .login-box button {
            width: 100%;
            padding: 17px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #1a1a2e;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .login-box button .btn-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            z-index: 1;
        }

        .login-box button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 60%);
            transform: scale(0);
            transition: transform 0.6s ease;
        }

        .login-box button:hover::before {
            transform: scale(1);
        }

        .login-box button:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 
                0 12px 50px rgba(255, 215, 0, 0.25),
                0 4px 20px rgba(255, 215, 0, 0.1);
        }

        .login-box button:active {
            transform: scale(0.97);
        }

        .login-box .error {
            color: #ff6b6b;
            font-size: 14px;
            margin-top: 14px;
            min-height: 24px;
            font-weight: 500;
            animation: errorShake 0.4s ease;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); opacity: 1; }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
        }

        /* =============================================
                   SITE CONTENT
                   ============================================= */
        .site-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 14px 18px 14px 18px;
            gap: 12px;
            position: relative;
            z-index: 1;
            animation: contentIn 0.8s ease-out;
        }

        @keyframes contentIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== Header ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px 10px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
            gap: 12px;
            flex-wrap: wrap;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-icon {
            font-size: 28px;
            animation: logoSpin 20s linear infinite;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.1));
        }

        @keyframes logoSpin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.05); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--primary));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShimmer 4s ease-in-out infinite;
            letter-spacing: -0.5px;
        }

        @keyframes textShimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .logo .logo-sub {
            font-size: 12px;
            color: #555;
            -webkit-text-fill-color: #555;
            background: none;
            font-weight: 400;
            margin-left: 4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .badge {
            background: rgba(255, 215, 0, 0.06);
            padding: 6px 18px;
            border-radius: 50px;
            color: var(--secondary);
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(255, 215, 0, 0.06);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            animation: badgeGlow 2s ease-in-out infinite;
        }

        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0); }
            50% { box-shadow: 0 0 30px rgba(255, 215, 0, 0.04); }
        }

        .badge .dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: dotPulse 1.2s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 10px rgba(74, 222, 128, 0); }
            50% { transform: scale(1.6); opacity: 0.6; box-shadow: 0 0 20px rgba(74, 222, 128, 0.2); }
        }

        /* ===== Audio Controls ===== */
        .audio-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
            padding: 4px 12px 4px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
        }

        .audio-controls:hover {
            border-color: rgba(255, 215, 0, 0.08);
        }

        .audio-label {
            color: #666;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .audio-volume {
            width: 60px;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 3px;
            outline: none;
            transition: 0.3s;
        }

        .audio-volume::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--secondary);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
        }

        .audio-volume::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--secondary);
            cursor: pointer;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #777;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .logout-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 107, 107, 0.05);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }

        .logout-btn:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        .logout-btn:hover {
            border-color: #ff6b6b;
            color: #ff6b6b;
            transform: translateY(-1px) scale(1.02);
        }

        .logout-btn:active {
            transform: scale(0.95);
        }

        /* ===== Iframe Wrapper ===== */
        .iframe-wrapper {
            flex: 1;
            border-radius: 20px;
            overflow: hidden;
            background: #0d0d18;
            border: 1px solid rgba(255, 255, 255, 0.04);
            min-height: 0;
            position: relative;
            transition: all 0.4s ease;
        }

        .iframe-wrapper:hover {
            border-color: rgba(255, 215, 0, 0.06);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.02);
        }

        .iframe-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 20px;
            pointer-events: auto !important;
        }

        /* ===== Iframe Loading Overlay ===== */
        .iframe-loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 13, 24, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 3;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .iframe-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .iframe-loader .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 215, 0, 0.05);
            border-top: 3px solid var(--secondary);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.6, 0, 0.4, 1) infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .iframe-loader .loader-text {
            color: #666;
            font-size: 13px;
            font-weight: 400;
            letter-spacing: 2px;
        }

        /* ===== Overlay ===== */
        .iframe-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            background: transparent;
            pointer-events: none !important;
            cursor: default;
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            user-select: none !important;
        }

        /* =============================================
                   TELEGRAM POPUP AD
                   ============================================= */
        .telegram-popup {
            position: fixed;
            bottom: 100px;
            right: 30px;
            z-index: 9998;
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            animation: popupIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            transform: translateY(30px) scale(0.9);
            opacity: 0;
            transition: all 0.3s ease;
            max-width: 320px;
            width: auto;
        }

        .telegram-popup:hover {
            transform: translateY(-2px) scale(1.02);
            border-color: rgba(255, 215, 0, 0.1);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.7);
        }

        .telegram-popup:active {
            transform: scale(0.96);
        }

        @keyframes popupIn {
            0% { opacity: 0; transform: translateY(30px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .telegram-popup .popup-icon {
            font-size: 36px;
            flex-shrink: 0;
            animation: telegramPulse 2s ease-in-out infinite;
        }

        @keyframes telegramPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .telegram-popup .popup-content {
            flex: 1;
        }

        .telegram-popup .popup-title {
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .telegram-popup .popup-title .highlight {
            color: #ffd700;
        }

        .telegram-popup .popup-desc {
            color: #888;
            font-size: 12px;
            margin-top: 2px;
            font-weight: 300;
        }

        .telegram-popup .popup-close {
            background: rgba(255, 255, 255, 0.04);
            border: none;
            color: #666;
            font-size: 14px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 50%;
            transition: all 0.3s ease;
            line-height: 1;
            flex-shrink: 0;
        }

        .telegram-popup .popup-close:hover {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.05);
        }

        .telegram-popup .popup-badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ff6b6b;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            animation: badgePulse 1.5s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* ===== Footer ===== */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px 4px 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            color: #555;
            font-size: 11px;
            flex-shrink: 0;
            gap: 10px;
            flex-wrap: wrap;
        }

        .footer .info {
            display: flex;
            align-items: center;
            gap: 16px;
            color: #555;
        }

        .footer .info .item {
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.3s ease;
            cursor: default;
        }

        .footer .info .item:hover {
            color: #777;
        }

        .footer .divider {
            color: #2a2a3e;
        }

        .footer .version {
            color: #333;
            font-size: 10px;
            letter-spacing: 0.5px;
            font-weight: 300;
        }

        /* =============================================
                   TOAST NOTIFICATIONS
                   ============================================= */
        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 350px;
            width: 100%;
        }

        .toast {
            background: rgba(20, 20, 35, 0.95);

    <!-- =============================================
    🎨 Particle Background
    ============================================= -->
    <script>
        (function createParticles() {
            const canvas = document.createElement('canvas');
            canvas.id = 'particles-canvas';
            document.body.prepend(canvas);
            const ctx = canvas.getContext('2d');
            let particles = [];
            let mouseX = 0;
            let mouseY = 0;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.3;
                    this.speedY = (Math.random() - 0.5) * 0.3;
                    this.opacity = Math.random() * 0.5 + 0.1;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        const force = (150 - dist) / 150 * 0.02;
                        this.x -= dx * force;
                        this.y -= dy * force;
                    }
                    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 215, 0, ${this.opacity})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }

            function drawLines() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(255, 215, 0, ${0.04 * (1 - dist / 120)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                drawLines();
                requestAnimationFrame(animate);
            }

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            document.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    mouseX = e.touches[0].clientX;
                    mouseY = e.touches[0].clientY;
                }
            }, { passive: true });

            animate();
        })();
    </script>

            e.stopPropagation();
            return false;
        }, true);

        try {
            mainIframe.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                e.stopPropagation();
                return false;
            }, true);
        } catch(e) {}

        iframeWrapper.addEventListener('mousedown', function(e) {
            if (e.button === 2) {
                e.preventDefault();
                return false;
            }
        });

        ['selectstart', 'copy', 'cut', 'paste'].forEach(eventName => {
            document.addEventListener(eventName, function(e) {
                if (iframeWrapper.contains(e.target)) {
                    e.preventDefault();
                    e.stopPropagation();
                    return false;
                }
            }, true);
        });

        // ===== Auto-focus =====
        window.addEventListener('load', function() {
            setTimeout(() => passwordInput.focus(), 500);
            showToast('🎵', 'All Sounds Ready', 'Typing • Click • Error • Logout • ah.mp3', 'info');
        });

        document.addEventListener('click', function() {
            if (!loginOverlay.classList.contains('hidden')) {
                passwordInput.focus();
            }
        });

        // ===== Iframe loader timeout =====
        setTimeout(function() {
            if (!iframeLoader.classList.contains('hidden')) {
                iframeLoader.innerHTML = `
                    <div style="color:#ffd700; font-size:14px; text-align:center;">
                        ⏳ Taking longer than expected<br>
                        <span style="color:#666; font-size:12px;">Check your connection</span>
                    </div>
                `;
            }
        }, 10000);

        console.log('🚀 Advanced Site Loaded!');
        console.log('🔑 Valid Passwords:', VALID_PASSWORDS);
        console.log('✨ Particle System Active');
        console.log('🎵 All Sounds Active:');
        console.log('   • ⌨️ Typing sound');
        console.log('   • 👆 Click sound');
        console.log('   • 🔴 Error sound');
        console.log('   • 🚪 Logout sound');
        console.log('   • 🎵 ah.mp3 (success)');
        console.log('📱 Telegram Popup Active!');
    </script>
